<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>출고 업무 기록</title>
<link href="https://fonts.googleapis.com/css2?family=SUIT:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── DARK MODE (기본) ── */
:root{
  --bg:#0C0E16;--surf:#141824;--s2:#1C2130;
  --bdr:rgba(255,255,255,.09);--bdr2:rgba(255,255,255,.14);
  --tx:#E8EDF8;--t2:#8A96B4;--t3:#4A5470;--t4:#252A40;
  --acc:#4A8CFF;--grn:#2DD4A0;--red:#FF6B6B;
  --sans:'SUIT',sans-serif;--r:16px;
  --top-bg:rgba(12,14,22,.92);--sum-bg:#141824;
  --card-bg:#141824;--card-border:rgba(255,255,255,.09);
  --btn-sec-bg:rgba(255,255,255,.06);--btn-sec-c:rgba(255,255,255,.5);
}
/* ── LIGHT MODE ── */
@media(prefers-color-scheme:light){
  :root{
    --bg:#F4F5F8;--surf:#FFFFFF;--s2:#F0F1F5;
    --bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.13);
    --tx:#1A1D2E;--t2:#555E7A;--t3:#8891AA;--t4:#C0C6D8;
    --acc:#2563EB;--grn:#059669;--red:#DC2626;
    --top-bg:rgba(244,245,248,.94);--sum-bg:#FFFFFF;
    --card-bg:#FFFFFF;--card-border:rgba(0,0,0,.08);
    --btn-sec-bg:rgba(0,0,0,.05);--btn-sec-c:rgba(0,0,0,.45);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{background:var(--bg);min-height:100%}
body{font-family:var(--sans);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(74,140,255,.06),transparent 60%)}
@media(prefers-color-scheme:light){body::before{background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(37,99,235,.04),transparent 60%)}}

/* ── HEADER ── */
.top{position:sticky;top:0;z-index:10;background:var(--top-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bdr);padding:env(safe-area-inset-top,14px) 20px 14px}
.top-inner{max-width:640px;width:100%;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.top-title{font-size:22px;font-weight:400;color:var(--tx);cursor:text;outline:none;min-width:80px;border-bottom:1px solid transparent;transition:border-color .2s}
.top-title:focus{border-color:rgba(74,140,255,.5)}
.top-clock{text-align:right}
.top-time{font-size:28px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:-1.5px;color:var(--tx)}
.top-date{font-size:13px;color:var(--t3);margin-top:2px}

/* ── SUMMARY BAR ── */
.summary-wrap{border-bottom:1px solid var(--bdr);position:relative;z-index:1;background:var(--sum-bg)}
.summary{display:grid;grid-template-columns:1fr 1fr;max-width:640px;width:100%;margin:0 auto}
.sv{padding:12px 20px;border-right:1px solid var(--bdr);display:flex;align-items:center;gap:12px}
.sv:last-child{border-right:none}
.sv-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sv-icon.w{background:rgba(45,212,160,.15);color:var(--grn)}
.sv-icon.t{background:rgba(74,140,255,.12);color:var(--acc)}
@media(prefers-color-scheme:light){
  .sv-icon.w{background:rgba(5,150,105,.1);color:var(--grn)}
  .sv-icon.t{background:rgba(37,99,235,.08);color:var(--acc)}
}
.sv-val{font-size:18px;font-weight:300;font-variant-numeric:tabular-nums;color:var(--tx)}
.sv-lbl{font-size:10px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}

/* ── EDIT BAR ── */
.edit-bar{display:none;position:relative;z-index:1;justify-content:center;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 16px;background:rgba(74,140,255,.07);border-bottom:1px solid rgba(74,140,255,.15)}
.edit-bar.show{display:flex}
.edit-hint{color:var(--acc);font-size:11px}
.eb-btn{background:rgba(74,140,255,.15);border:1px solid rgba(74,140,255,.3);color:var(--acc);border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:var(--sans)}
.eb-btn.green{background:rgba(45,212,160,.12);border-color:rgba(45,212,160,.3);color:var(--grn)}
.eb-btn.gray{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:var(--t2)}
@media(prefers-color-scheme:light){
  .eb-btn.gray{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:var(--t2)}
}

/* ── GRID ── */
.grid-wrap{position:relative;z-index:1;display:flex;justify-content:center}
.grid{width:100%;max-width:640px;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;align-content:start}

/* ── GROUP HEADER ── */
.gh{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:4px 2px;margin-top:4px}
.gh-label{font-size:10px;font-weight:400;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:3px 10px;border-radius:100px}
.gh-line{flex:1;height:1px;background:var(--bdr)}
@media(prefers-color-scheme:light){
  .gh-label{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.09)}
}

/* ── STAFF CARD ── */
.sc{border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;transition:all .22s cubic-bezier(.22,1,.36,1);position:relative}
.sc.idle{background:var(--card-bg);border:1px solid var(--card-border);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.sc.working{background:linear-gradient(160deg,rgba(45,212,160,.13),rgba(45,212,160,.04));border:1.5px solid rgba(45,212,160,.4);box-shadow:0 0 0 1px rgba(45,212,160,.18),0 4px 18px rgba(45,212,160,.12)}
@media(prefers-color-scheme:light){
  .sc.idle{box-shadow:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05)}
  .sc.working{background:linear-gradient(160deg,rgba(5,150,105,.07),rgba(5,150,105,.02));border-color:rgba(5,150,105,.35);box-shadow:0 0 0 1px rgba(5,150,105,.15),0 4px 14px rgba(5,150,105,.1)}
}
.sc-stripe{height:3px;width:100%;flex-shrink:0;transition:opacity .3s}
.sc.idle .sc-stripe{opacity:.35}
.sc.working .sc-stripe{opacity:1}
.sc-body{padding:12px 12px 10px;display:flex;flex-direction:column;align-items:center;gap:7px}
.sc-row1{display:flex;flex-direction:column;align-items:center;gap:7px}
.sc-num{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:400;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.2) inset}
.sc-badge{display:flex;align-items:center;gap:5px;font-size:10px;padding:3px 10px;border-radius:100px;border:1px solid;transition:all .3s;font-weight:400}
.sc.idle .sc-badge{color:var(--t3);background:var(--btn-sec-bg);border-color:var(--bdr)}
.sc.working .sc-badge{color:var(--grn);background:rgba(45,212,160,.1);border-color:rgba(45,212,160,.28)}
.sc-pulse{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s}
.sc.idle .sc-pulse{background:var(--t4)}
.sc.working .sc-pulse{background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.sc-name{font-size:14px;font-weight:400;color:var(--tx);line-height:1.3;display:block;text-align:center}
.sc-part{font-size:10px;color:var(--t3);margin-top:2px;display:block;text-align:center}
.sc-time{font-size:22px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:-.8px;line-height:1;transition:color .3s;text-align:center}
.sc.idle .sc-time{color:var(--t2)}
.sc.working .sc-time{color:var(--grn)}
.sc-toggle{width:100%;padding:9px 0;border:none;font-size:12px;font-weight:400;font-family:var(--sans);cursor:pointer;letter-spacing:.02em;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.sc.idle .sc-toggle{background:rgba(74,140,255,.08);color:var(--acc);border-top:1px solid rgba(74,140,255,.12)}
.sc.working .sc-toggle{background:rgba(45,212,160,.09);color:var(--grn);border-top:1px solid rgba(45,212,160,.18)}
@media(prefers-color-scheme:light){
  .sc.idle .sc-toggle{background:rgba(37,99,235,.06);color:var(--acc);border-top-color:rgba(37,99,235,.1)}
  .sc.working .sc-toggle{background:rgba(5,150,105,.07);color:var(--grn);border-top-color:rgba(5,150,105,.15)}
}
.sc-toggle:active{transform:scale(.97)}

/* ── DRAG ── */
.drag-handle{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;background:var(--btn-sec-bg);border:1px solid var(--bdr);display:none;align-items:center;justify-content:center;cursor:grab;font-size:13px;color:var(--t3);z-index:5;touch-action:none}
.edit-mode .drag-handle{display:flex}
.edit-mode .sc-toggle{pointer-events:none;opacity:.4}
.sc.dragging{opacity:.3;transform:scale(.97)}
.sc.drag-over{border-color:var(--acc)!important;background:rgba(74,140,255,.08)!important;box-shadow:0 0 0 2px rgba(74,140,255,.25)!important}

/* ── ACTION BAR ── */
.actionbar{position:sticky;bottom:0;z-index:10;background:var(--top-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bdr);padding:10px 20px calc(env(safe-area-inset-bottom,0)+10px)}
.ab-inner{max-width:640px;width:100%;margin:0 auto}
.ab-btns{display:flex;gap:8px}
.ab-btn{flex:1;padding:11px;border-radius:12px;border:none;font-size:12px;font-weight:400;font-family:var(--sans);cursor:pointer;transition:all .15s}
.ab-pri{background:rgba(74,140,255,.15);color:var(--acc);border:1px solid rgba(74,140,255,.22)}
.ab-sec{background:var(--btn-sec-bg);color:var(--btn-sec-c);border:1px solid var(--bdr)}
@media(prefers-color-scheme:light){
  .ab-pri{background:rgba(37,99,235,.1);color:var(--acc);border-color:rgba(37,99,235,.18)}
}
.ab-btn:active{transform:scale(.97)}
.copy-help{margin-top:8px;background:rgba(74,140,255,.07);border:1px solid rgba(74,140,255,.15);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--t3);line-height:1.8;display:none}
.copy-help.show{display:block}
.copy-help strong{color:var(--acc);font-weight:400}
@media(prefers-color-scheme:light){
  .copy-help{background:rgba(37,99,235,.05);border-color:rgba(37,99,235,.15)}
}

/* ── ADMIN MODAL ── */
.adm-bg{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center}
.adm-bg.open{display:flex}
.adm{background:linear-gradient(160deg,var(--surf),var(--s2));border:1px solid var(--bdr2);border-radius:20px;padding:28px 26px;width:320px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.08) inset}
@media(prefers-color-scheme:light){
  .adm{box-shadow:0 24px 64px rgba(0,0,0,.18)}
}
.adm-title{font-size:15px;font-weight:400;color:var(--tx);margin-bottom:4px;text-align:center}
.adm-sub{font-size:11px;color:var(--t3);text-align:center;margin-bottom:20px}
.pin-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--btn-sec-bg);border:1.5px solid var(--bdr);transition:all .2s}
.pin-dot.filled{background:var(--acc);border-color:var(--acc);box-shadow:0 0 8px rgba(74,140,255,.4)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pk{background:var(--btn-sec-bg);border:1px solid var(--bdr);border-radius:12px;padding:14px 0;font-size:18px;font-weight:300;font-family:var(--sans);color:var(--tx);cursor:pointer;text-align:center;transition:all .15s}
.pk:active{background:var(--bdr);transform:scale(.94)}
.pk.del{font-size:14px;color:var(--t2)}
.adm-action{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:var(--red);border-radius:12px;padding:13px;width:100%;font-size:13px;font-weight:400;font-family:var(--sans);cursor:pointer;margin-top:14px;transition:all .15s;display:none}
.adm-action.show{display:block}
.adm-action:hover{background:rgba(220,38,38,.18)}
.adm-close{background:var(--btn-sec-bg);border:1px solid var(--bdr);color:var(--t2);border-radius:12px;padding:11px;width:100%;font-size:12px;font-family:var(--sans);cursor:pointer;margin-top:8px;transition:all .15s}
.adm-msg{font-size:11px;text-align:center;min-height:16px;margin-bottom:4px;color:var(--t3)}
</style>
</head>
<body>
<div class="top">
  <div class="top-inner">
    <div class="top-title" id="page-title" contenteditable="true" spellcheck="false"
      onblur="localStorage.setItem('punch_page_title',this.innerText.trim())"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">출고 업무 기록</div>
    <div class="top-clock">
      <div class="top-time" id="top-time">00:00:00</div>
      <div class="top-date" id="top-date"></div>
    </div>
  </div>
</div>
<div class="summary-wrap">
  <div class="summary">
    <div class="sv">
      <div class="sv-icon w"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <div><div class="sv-val" id="sb-w">0명</div><div class="sv-lbl">업무 중</div></div>
    </div>
    <div class="sv">
      <div class="sv-icon t"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 15.5"/></svg></div>
      <div><div class="sv-val" id="sb-t">0분</div><div class="sv-lbl">팀 총 투입</div></div>
    </div>
  </div>
</div>
<div class="edit-bar" id="edit-bar">
  <span class="edit-hint">⠿ 드래그하여 순서 변경</span>
  <button class="eb-btn green" onclick="groupByPart()">파트별 정렬</button>
  <button class="eb-btn gray" onclick="resetOrder()">기본 순서</button>
  <button class="eb-btn" onclick="toggleEdit()">완료</button>
</div>
<div class="grid-wrap"><div class="grid" id="grid"></div></div>
<div class="actionbar">
  <div class="ab-inner">
    <div class="ab-btns">
      <button class="ab-btn ab-sec" onclick="toggleEdit()">배열 변경</button>
      <button class="ab-btn ab-pri" id="copy-btn" onclick="doCopy()">시간 복사 &amp; 활용법</button>
    </div>
    <div class="copy-help" id="copy-help">
      <strong>복사된 내용</strong>을 대시보드(index.html)에서 활용하세요<br>
      ① 대시보드 → 입력 탭 → QR 연동 버튼 클릭<br>
      ② <strong>시간 불러오기</strong> → 직원별 시간 자동 입력<br>
      ③ 출고량 입력 후 <strong>등록</strong> → UHP 자동 계산
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:6px">
      <button onclick="openAdm()" style="background:none;border:none;color:var(--t4);font-size:10px;font-family:var(--sans);cursor:pointer;padding:2px 4px;transition:color .15s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--t4)'">관리자</button>
    </div>
  </div>
</div>
<div class="adm-bg" id="adm-bg" onclick="if(event.target===this)closeAdm()">
  <div class="adm">
    <div class="adm-title">🔐 관리자 인증</div>
    <div class="adm-sub">PIN 4자리를 입력하세요</div>
    <div class="pin-row" id="pin-row">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="adm-msg" id="adm-msg"></div>
    <div class="pin-keys">
      <button class="pk" onclick="pinKey('1')">1</button><button class="pk" onclick="pinKey('2')">2</button><button class="pk" onclick="pinKey('3')">3</button>
      <button class="pk" onclick="pinKey('4')">4</button><button class="pk" onclick="pinKey('5')">5</button><button class="pk" onclick="pinKey('6')">6</button>
      <button class="pk" onclick="pinKey('7')">7</button><button class="pk" onclick="pinKey('8')">8</button><button class="pk" onclick="pinKey('9')">9</button>
      <button class="pk del" onclick="pinDel()">⌫</button><button class="pk" onclick="pinKey('0')">0</button><button class="pk del" onclick="pinClear()">C</button>
    </div>
    <div id="adm-actions" style="display:none;margin-top:14px">
  <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;text-align:center">초기화 범위 선택</div>
  <button class="adm-action show" onclick="doReset('today')" style="display:block;margin-bottom:8px">
    📅 오늘 측정 시간만 초기화
  </button>
  <button class="adm-action show" onclick="doReset('week')">
    📆 이번 주 측정 시간 초기화
  </button>
  <button class="adm-action show" onclick="doReset('all')" style="background:rgba(220,38,38,.18);border-color:rgba(220,38,38,.4)">
    ⚠ 전체 기록 삭제 (복구 불가)
  </button>
  <div style="margin-top:12px;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:6px;text-align:center">관리자 PIN 변경</div>
  <div style="display:flex;gap:6px">
    <input id="new-pin-input" type="password" maxlength="4" placeholder="새 PIN 4자리"
      style="flex:1;padding:9px 12px;border-radius:10px;border:1px solid var(--bdr2);background:rgba(0,0,0,.25);color:var(--tx);font-size:13px;font-family:var(--sans);text-align:center;letter-spacing:.15em">
    <button onclick="changePIN()" style="padding:9px 14px;border-radius:10px;border:1px solid rgba(74,140,255,.3);background:rgba(74,140,255,.15);color:var(--acc);font-size:12px;font-family:var(--sans);cursor:pointer;white-space:nowrap">변경</button>
  </div>
</div>
    <button class="adm-close" onclick="closeAdm()">취소</button>
  </div>
</div>
<script>
const K='punch_log_v1',KS='uhp_v3_names',KO='punch_order',KT='punch_page_title',KPIN='punch_admin_pin';
const CLR=['#4F86C6','#5BA4A4','#5BAD8A','#6FAABC','#C4956A','#B8896A','#8B7DC4','#B07EA8'];
function loadStaff(){const r=localStorage.getItem(KS)||localStorage.getItem('punch_names_v1');if(!r)return[{name:'팀장',part:''},{name:'전산',part:''},{name:'정규직A',part:''},{name:'정규직B',part:''},{name:'계약직1',part:''},{name:'계약직2',part:''}];const p=JSON.parse(r);return p.length&&typeof p[0]==='string'?p.map(n=>({name:n,part:''})):p;}
let STAFF=loadStaff();
let logs=JSON.parse(localStorage.getItem(K)||'[]');
let order=JSON.parse(localStorage.getItem(KO)||'null')||STAFF.map((_,i)=>i);
let editMode=false,dragSrc=-1,touchSrcIdx=-1,pinBuf='',admUnlocked=false;
const tod=()=>new Date().toISOString().slice(0,10);
function hms(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function hm(ms){const m=Math.floor(ms/60000),h=Math.floor(m/60);return h>0?h+'시간 '+(m%60)+'분':(m+'분');}
function fmt(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function todayLogs(i){return logs.filter(l=>l.date===tod()&&(l.staff===i||l.name===STAFF[i]?.name));}
function calcMs(i){const sl=todayLogs(i);let ms=0,st=null;for(const l of sl){if(l.type==='start')st=l.ts;else if(l.type==='end'&&st){ms+=l.ts-st;st=null;}}return st?ms+(Date.now()-st):ms;}
function isWorking(i){const sl=todayLogs(i);return sl.length?sl[sl.length-1].type==='start':false;}
function saveLogs(){localStorage.setItem(K,JSON.stringify(logs));}
function saveOrder(){localStorage.setItem(KO,JSON.stringify(order));}

function renderGrid(){
  STAFF.forEach((_,i)=>{if(!order.includes(i))order.push(i);});
  order=order.filter(i=>i<STAFF.length);
  const g=document.getElementById('grid');
  const showGroups=!editMode&&STAFF.some(s=>s.part);
  let html='',lastPart=null;
  order.forEach((si,oi)=>{
    const s=STAFF[si]||{name:'직원'+(si+1),part:''};
    const w=isWorking(si),ms=calcMs(si),c=CLR[si%CLR.length],pt=s.part||'';
    if(showGroups&&pt!==lastPart){lastPart=pt;if(pt)html+='<div class="gh"><div class="gh-line"></div><div class="gh-label">'+pt+'</div><div class="gh-line"></div></div>';}
    const drag=editMode?'draggable="true" ondragstart="onDS(event,'+oi+')" ondragover="onDO(event,'+oi+')" ondrop="onDrop(event,'+oi+')" ondragend="onDE(event)"':'';
    html+='<div class="sc '+(w?'working':'idle')+'" id="sc-'+si+'" data-oi="'+oi+'" '+drag+'>'
      +(editMode?'<div class="drag-handle" ontouchstart="onTS(event,'+oi+')">⠿</div>':'')
      +'<div class="sc-stripe" style="background:'+c+'"></div>'
      +'<div class="sc-body">'
        +'<div class="sc-row1"><div class="sc-num" style="background:'+c+'">'+(si+1)+'</div>'
        +'<div class="sc-badge"><div class="sc-pulse"></div><span>'+(w?'업무 중':'대기')+'</span></div></div>'
        +'<div style="text-align:center;padding:0 2px"><div class="sc-name">'+s.name+'</div>'+(pt?'<div class="sc-part">'+pt+'</div>':'')+'</div>'
        +'<div class="sc-time">'+hms(ms)+'</div>'
      +'</div>'
      +'<button class="sc-toggle" onclick="tap('+si+')">'
        +'<span>'+(w?'■':'▶')+'</span><span>'+(w?'업무 종료':'업무 시작')+'</span>'
      +'</button>'
    +'</div>';
  });
  g.innerHTML=html;
  g.className=editMode?'grid edit-mode':'grid';
}

function updateSummary(){
  let w=0,total=0;STAFF.forEach((_,i)=>{if(isWorking(i))w++;total+=calcMs(i);});
  document.getElementById('sb-w').textContent=w+'명';
  document.getElementById('sb-t').textContent=hm(total);
}
function tap(i){
  const w=isWorking(i);
  logs.push({staff:i,name:STAFF[i]?.name||'',type:w?'end':'start',ts:Date.now(),date:tod()});
  saveLogs();if(navigator.vibrate)navigator.vibrate(w?[30,20,30]:50);
  updateCard(i);updateSummary();
}
function updateCard(i){
  const card=document.getElementById('sc-'+i);if(!card)return;
  const w=isWorking(i),ms=calcMs(i);
  card.className='sc '+(w?'working':'idle');
  const pulse=card.querySelector('.sc-pulse');
  if(pulse)pulse.style.cssText=w?'background:var(--grn);box-shadow:0 0 6px var(--grn);animation:blink 1.4s infinite':'background:var(--t4)';
  const badge=card.querySelector('.sc-badge span');if(badge)badge.textContent=w?'업무 중':'대기';
  const time=card.querySelector('.sc-time');if(time)time.textContent=hms(ms);
  const spans=card.querySelectorAll('.sc-toggle span');
  if(spans.length>=2){spans[0].textContent=w?'■':'▶';spans[1].textContent=w?'업무 종료':'업무 시작';}
}
function onDS(e,oi){dragSrc=oi;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function onDO(e,oi){e.preventDefault();if(dragSrc===oi)return;document.querySelectorAll('.sc.drag-over').forEach(el=>el.classList.remove('drag-over'));e.currentTarget.closest('.sc')?.classList.add('drag-over');}
function onDrop(e,oi){e.preventDefault();document.querySelectorAll('.sc.drag-over').forEach(el=>el.classList.remove('drag-over'));if(dragSrc<0||dragSrc===oi)return;const m=order.splice(dragSrc,1)[0];order.splice(oi,0,m);dragSrc=-1;saveOrder();renderGrid();}
function onDE(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.sc.drag-over').forEach(el=>el.classList.remove('drag-over'));dragSrc=-1;}
let touchEl=null;
function onTS(e,oi){touchSrcIdx=oi;touchEl=e.currentTarget.closest('.sc');touchEl?.classList.add('dragging');}
document.addEventListener('touchmove',function(e){if(touchSrcIdx<0)return;e.preventDefault();const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);const tc=el?.closest('.sc[data-oi]');document.querySelectorAll('.sc.drag-over').forEach(c=>c.classList.remove('drag-over'));if(tc&&tc!==touchEl)tc.classList.add('drag-over');},{passive:false});
document.addEventListener('touchend',function(e){if(touchSrcIdx<0)return;const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);const tc=el?.closest('.sc[data-oi]');document.querySelectorAll('.sc.dragging,.sc.drag-over').forEach(c=>c.classList.remove('dragging','drag-over'));if(tc){const toi=parseInt(tc.dataset.oi);if(touchSrcIdx!==toi){const m=order.splice(touchSrcIdx,1)[0];order.splice(toi,0,m);saveOrder();renderGrid();}}touchSrcIdx=-1;touchEl=null;});
function toggleEdit(){editMode=!editMode;document.getElementById('edit-bar').classList.toggle('show',editMode);renderGrid();}
function groupByPart(){const pts=[...new Set(STAFF.map(s=>s.part||''))];const no=[];pts.forEach(p=>STAFF.forEach((_,i)=>{if((STAFF[i].part||'')===p)no.push(i);}));order=no;saveOrder();renderGrid();}
function resetOrder(){order=STAFF.map((_,i)=>i);saveOrder();renderGrid();}
function tick(){
  const n=new Date();
  document.getElementById('top-time').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  document.getElementById('top-date').textContent=(n.getMonth()+1)+'/'+n.getDate()+' ('+['일','월','화','수','목','금','토'][n.getDay()]+')';
  STAFF.forEach((_,i)=>{if(isWorking(i)){const el=document.getElementById('sc-'+i)?.querySelector('.sc-time');if(el)el.textContent=hms(calcMs(i));}});
}
function doCopy(){
  let t='[B2C 출고 투입시간] '+tod()+'\n';
  STAFF.forEach((s,i)=>{const ms=calcMs(i);if(ms>0)t+=s.name+': '+hms(ms)+'\n';});
  t+='팀 합계: '+hms(STAFF.reduce((a,_,i)=>a+calcMs(i),0));
  navigator.clipboard?.writeText(t).then(()=>{const b=document.getElementById('copy-btn');b.textContent='✓ 복사 완료';setTimeout(()=>b.textContent='시간 복사 & 활용법',2200);});
  const h=document.getElementById('copy-help');h.classList.add('show');setTimeout(()=>h.classList.remove('show'),8000);
}
function openAdm(){pinBuf='';admUnlocked=false;updatePinDots();document.getElementById('adm-msg').textContent='';document.getElementById('adm-actions').style.display='none';document.getElementById('adm-bg').classList.add('open');}
function closeAdm(){document.getElementById('adm-bg').classList.remove('open');pinBuf='';admUnlocked=false;}
function pinKey(d){if(admUnlocked||pinBuf.length>=4)return;pinBuf+=d;updatePinDots();if(pinBuf.length===4)setTimeout(checkPin,120);}
function pinDel(){if(!admUnlocked&&pinBuf.length>0){pinBuf=pinBuf.slice(0,-1);updatePinDots();}}
function pinClear(){if(!admUnlocked){pinBuf='';updatePinDots();}}
function updatePinDots(){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(i<pinBuf.length?' filled':'');}}
function checkPin(){
  const saved=localStorage.getItem(KPIN)||'0000';
  if(pinBuf===saved){
    admUnlocked=true;
    document.getElementById('adm-msg').style.color='var(--grn)';document.getElementById('adm-msg').textContent='✓ 인증 성공';
    document.getElementById('adm-actions').style.display='block';
    for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot filled';}
  }else{
    document.getElementById('adm-msg').style.color='var(--red)';document.getElementById('adm-msg').textContent='PIN이 틀렸습니다';
    for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot error';}
    setTimeout(()=>{pinBuf='';updatePinDots();document.getElementById('adm-msg').textContent='';},800);
  }
}
function doReset(range){
  if(!admUnlocked)return;
  let msg='',filterFn;
  const t=tod();
  if(range==='today'){
    msg='오늘('+t+') 측정 시간을 초기화하시겠습니까?';
    filterFn=l=>l.date!==t;
  }else if(range==='week'){
    const wd=new Date();wd.setDate(wd.getDate()-wd.getDay());
    const weekStart=wd.toISOString().slice(0,10);
    msg='이번 주('+weekStart+' 이후) 측정 시간을 초기화하시겠습니까?';
    filterFn=l=>l.date<weekStart;
  }else{
    msg='전체 기록을 삭제하시겠습니까?\n이 작업은 복구할 수 없습니다.';
    filterFn=l=>false;
  }
  if(!confirm(msg))return;
  logs=logs.filter(filterFn);saveLogs();renderGrid();updateSummary();closeAdm();
  const b=document.getElementById('copy-btn');
  b.textContent='✓ 초기화 완료';setTimeout(()=>b.textContent='시간 복사 & 활용법',2000);
}
function changePIN(){
  if(!admUnlocked)return;
  const inp=document.getElementById('new-pin-input');
  const np=(inp?.value||'').trim();
  if(!/^\d{4}$/.test(np)){alert('숫자 4자리를 입력해주세요.');return;}
  localStorage.setItem(KPIN,np);
  inp.value='';
  alert('PIN이 변경되었습니다.');
}
(function init(){
  const saved=localStorage.getItem(KT);if(saved)document.getElementById('page-title').textContent=saved;
  const p=new URLSearchParams(location.search);
  const nm=p.get('names');
  if(nm){const ns=nm.split(',').map(s=>s.trim()).filter(Boolean);if(ns.length>=2){STAFF=ns.map(n=>({name:n,part:''}));order=STAFF.map((_,i)=>i);}}
  renderGrid();updateSummary();setInterval(tick,1000);setInterval(updateSummary,5000);tick();
})();
</script>
</body>
</html>
